<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Projetos</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f5f5f3;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 { margin-bottom: 20px; }

.card {
  background: #fff;
  border: 1px solid #e0e0da;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

textarea, input {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.checklist label {
  display: block;
  font-size: 13px;
}

.btn {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.btn-primary {
  background: #1a1a18;
  color: white;
}

.report {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Controle de Projetos</h1>

<div id="projects"></div>

<button class="btn btn-primary" onclick="gerarRelatorio()">Gerar relatório</button>

<div class="report" id="relatorio"></div>

<script>

const STORAGE_KEY = "multi_projetos";

const projetos = ["sempre_nova", "sgf", "sgter", "sigest"];

function nomeProjeto(id){
  return {
    sempre_nova: "Sempre Nova",
    sgf: "SGF",
    sgter: "SGTER",
    sigest: "SIGEST"
  }[id];
}

function load(){ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
function save(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function calcularDatas(inicio, duracao){
  if(!inicio || !duracao) return "";

  let start = new Date(inicio);

  let review = new Date(start);
  review.setDate(start.getDate() + duracao - 1);

  let retro = new Date(review);
  retro.setDate(review.getDate() + 1);

  let planning = new Date(retro);

  return `Review: ${review.toLocaleDateString()} | Retro: ${retro.toLocaleDateString()} | Planning: ${planning.toLocaleDateString()}`;
}

function validar(id){
  let d = load();
  let a = [];

  if (!d[id+"_planning_ok"]) a.push("Sem planning");
  if (!d[id+"_cp"]) a.push("Fora do CP");
  if (!d[id+"_review"]) a.push("Sem review");
  if (d[id+"_review"] && !d[id+"_retro"]) a.push("Sem retro");

  return a.join(" | ");
}

function criarProjetos(){
  let html = "";

  projetos.forEach(id => {
    html += `
    <div class="card">
      <h3>${nomeProjeto(id)}</h3>

      <input type="date" data-id="${id}_inicio">
      <input type="number" placeholder="Duração (dias)" data-id="${id}_duracao">

      <textarea placeholder="Cerimônias" data-id="${id}_datas" readonly></textarea>
      <textarea placeholder="Status" data-id="${id}_status"></textarea>

      <div class="checklist">
        <label><input type="checkbox" data-id="${id}_planning_ok"> Planning</label>
        <label><input type="checkbox" data-id="${id}_cp"> CP</label>
        <label><input type="checkbox" data-id="${id}_review"> Review</label>
        <label><input type="checkbox" data-id="${id}_retro"> Retro</label>
      </div>

      <textarea placeholder="Dailies" data-id="${id}_dailies"></textarea>
      <textarea placeholder="Alertas" data-id="${id}_alertas" readonly></textarea>
    </div>
    `;
  });

  document.getElementById("projects").innerHTML = html;
}

function atualizar(){
  let d = load();

  projetos.forEach(id => {
    let inicio = d[id+"_inicio"];
    let duracao = Number(d[id+"_duracao"]);

    let datas = calcularDatas(inicio, duracao);
    document.querySelector(`[data-id="${id}_datas"]`).value = datas;
    d[id+"_datas"] = datas;

    let alertas = validar(id);
    document.querySelector(`[data-id="${id}_alertas"]`).value = alertas;
    d[id+"_alertas"] = alertas;
  });

  save(d);
}

function init(){
  criarProjetos();

  let d = load();

  document.querySelectorAll("[data-id]").forEach(el => {

    if(el.type === "checkbox"){
      el.checked = d[el.dataset.id] || false;

      el.addEventListener("change", () => {
        let dd = load();
        dd[el.dataset.id] = el.checked;
        save(dd);
        atualizar();
      });

    } else {
      el.value = d[el.dataset.id] || "";

      el.addEventListener("input", () => {
        let dd = load();
        dd[el.dataset.id] = el.value;
        save(dd);
        atualizar();
      });
    }
  });

  atualizar();
}

function gerarRelatorio(){
  let d = load();
  let texto = "";

  projetos.forEach(id => {
    texto += `📌 ${nomeProjeto(id)}\n`;
    texto += `Status: ${d[id+"_status"] || "-"}\n`;
    texto += `Datas: ${d[id+"_datas"] || "-"}\n\n`;
  });

  document.getElementById("relatorio").innerText = texto;
}

init();

</script>

</body>
</html>
