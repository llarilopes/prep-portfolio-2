<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meu Controle de Projetos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;padding:2rem 1rem;max-width:980px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:1.5rem}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:#111110;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#1e1e1c;border:0.5px solid #333;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center}
.login-box h2{font-size:18px;font-weight:500;margin-bottom:6px;color:#f0efe8}
.login-box p{font-size:13px;color:#888;margin-bottom:1.5rem}
.login-box input{width:100%;padding:10px 14px;border-radius:8px;border:0.5px solid #444;font-size:14px;font-family:inherit;background:#2c2c2a;color:#f0efe8;margin-bottom:10px}
.login-box input::placeholder{color:#666}
.login-box input:focus{outline:none;border-color:#666;background:#333}
.login-box button{width:100%;padding:10px;border-radius:8px;border:none;background:#f0efe8;color:#1a1a18;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer}
.login-error{font-size:12px;color:#f87171;margin-top:8px;display:none}

/* NAV */
.nav{display:flex;gap:6px;margin-bottom:1.75rem;border-bottom:1px solid #e0e0da;padding-bottom:1rem;flex-wrap:wrap}
.nav-btn{padding:7px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid #e0e0da;background:transparent;font-family:inherit;color:#888;transition:all .15s}
.nav-btn.active{background:#1a1a18;color:#f5f5f3;border-color:#1a1a18;font-weight:500}

/* TABS CATEGORIA */
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.cat-btn{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid;background:transparent;font-family:inherit;transition:all .15s}
.cat-btn.sprint{color:#0F6E56;border-color:#0F6E56}.cat-btn.sprint.active{background:#E1F5EE;font-weight:500}
.cat-btn.sustentacao{color:#185FA5;border-color:#185FA5}.cat-btn.sustentacao.active{background:#E6F1FB;font-weight:500}
.cat-btn.inicial{color:#854F0B;border-color:#854F0B}.cat-btn.inicial.active{background:#FAEEDA;font-weight:500}
.cat-btn.pausado{color:#5F5E5A;border-color:#5F5E5A}.cat-btn.pausado.active{background:#F1EFE8;font-weight:500}
.cat-panel{display:none}.cat-panel.active{display:block}

/* TABS PROJETO */
.proj-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;padding-bottom:10px;border-bottom:0.5px solid #e0e0da}
.proj-btn{padding:5px 14px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid #e0e0da;background:transparent;font-family:inherit;color:#888;transition:all .15s}
.proj-btn.active{background:#1a1a18;color:#f5f5f3;border-color:#1a1a18;font-weight:500}
.proj-panel{display:none}.proj-panel.active{display:block}

/* CARDS */
.project-card{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1rem 1.25rem;margin-bottom:16px}
.project-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.project-title{font-size:16px;font-weight:500}
.project-client{font-size:12px;color:#888;font-weight:400;margin-left:6px}
.proj-status-badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500}
.badge-verde{background:#E1F5EE;color:#0F6E56}.badge-amarelo{background:#FAEEDA;color:#854F0B}
.badge-vermelho{background:#FDE8E8;color:#9B1C1C}.badge-cinza{background:#F1EFE8;color:#5F5E5A}

/* TABS DIAS */
.day-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;border-bottom:0.5px solid #e0e0da;padding-bottom:10px}
.day-btn{padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:0.5px solid #e0e0da;background:transparent;font-family:inherit;color:#888;transition:all .15s}
.day-btn.active{background:#1a1a18;color:#f5f5f3;border-color:#1a1a18;font-weight:500}
.day-btn.geral{color:#0F6E56;border-color:#0F6E56}.day-btn.geral.active{background:#0F6E56;color:#fff}
.day-panel{display:none}.day-panel.active{display:block}

/* CAMPOS */
.section-divider{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 6px;border-top:0.5px solid #e0e0da;padding-top:10px}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.field textarea{width:100%;resize:vertical;font-size:13px;padding:6px 10px;border-radius:8px;border:0.5px solid #e0e0da;background:#f5f5f3;color:#1a1a18;font-family:inherit;line-height:1.5}
.field textarea:focus{outline:none;border-color:#aaa;background:#fff}
.urgency-field textarea{border-color:#f0a500;background:#fffbf0}
.urgency-field label{color:#854F0B;font-weight:500}
.log-field textarea{border-color:#c0b0f0;background:#f8f5ff}
.log-field label{color:#5533aa;font-weight:500}
.daily-field textarea{border-color:#c0cef7;background:#f0f4ff}
.daily-field label{color:#3355cc;font-weight:500}
.retro-field textarea{border-color:#b0e0c0;background:#f0fff5}
.retro-field label{color:#0F6E56;font-weight:500}

/* STATUS */
.status-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.status-opt{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid #e0e0da;background:transparent;font-family:inherit;color:#888}
.status-opt.sel-verde{background:#E1F5EE;color:#0F6E56;border-color:#0F6E56;font-weight:500}
.status-opt.sel-amarelo{background:#FAEEDA;color:#854F0B;border-color:#854F0B;font-weight:500}
.status-opt.sel-vermelho{background:#FDE8E8;color:#9B1C1C;border-color:#C81E1E;font-weight:500}
.status-opt.sel-cinza{background:#F1EFE8;color:#5F5E5A;border-color:#5F5E5A;font-weight:500}

/* RESPONSÁVEIS */
.resp-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.resp-row input{font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid #e0e0da;background:#f5f5f3;color:#1a1a18;font-family:inherit;flex:1;min-width:100px}

/* DATAS */
.sprint-dates{background:#f0f4ff;border:0.5px solid #c0cef7;border-radius:8px;padding:10px 14px;margin-bottom:10px}
.sprint-dates-title{font-size:12px;color:#3355cc;font-weight:500;margin-bottom:8px}
.sprint-dates-inputs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;align-items:flex-end}
.sprint-dates-inputs label{font-size:12px;color:#555;display:flex;flex-direction:column;gap:3px}
.sprint-dates-inputs input,.sprint-dates-inputs select{font-size:13px;padding:5px 8px;border-radius:6px;border:0.5px solid #c0cef7;background:#fff;font-family:inherit;color:#1a1a18}
.sprint-dates-result{margin-top:6px}
.days-counter{display:inline-block;font-size:12px;padding:3px 10px;border-radius:10px;font-weight:500}
.days-ok{background:#E1F5EE;color:#0F6E56}
.days-warn{background:#FAEEDA;color:#854F0B}
.days-late{background:#FDE8E8;color:#9B1C1C}

/* CHECKLIST */
.checklist{background:#f9f9f7;border:0.5px solid #e0e0da;border-radius:8px;padding:10px 14px;margin-bottom:10px}
.checklist-title{font-size:12px;color:#888;font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.check-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.check-item:last-child{margin-bottom:0}
.check-item input[type=checkbox]{width:15px;height:15px;accent-color:#0F6E56;cursor:pointer;flex-shrink:0}
.check-item span{font-size:13px;color:#1a1a18;line-height:1.4}
.check-item.checked span{color:#888;text-decoration:line-through}

/* AÇÕES */
.actions{display:flex;gap:8px;margin-top:1.5rem;flex-wrap:wrap}
.btn-primary{flex:1;min-width:180px;padding:10px 16px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a18;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.btn-primary.success{background:#E1F5EE;color:#0F6E56;border-color:#0F6E56}
.btn-secondary{padding:10px 16px;border-radius:8px;border:0.5px solid #e0e0da;background:transparent;color:#888;font-size:13px;cursor:pointer;font-family:inherit}
.btn-save{background:#1a1a18;color:#f5f5f3;border-color:#1a1a18}

/* RELATÓRIO */
.report-actions{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.mode-btn{padding:7px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:0.5px solid #e0e0da;background:transparent;font-family:inherit;color:#888}
.mode-btn.active{background:#1a1a18;color:#f5f5f3;border-color:#1a1a18;font-weight:500}
.report-section{margin-bottom:2rem}
.report-section h2{font-size:13px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.report-card{background:#fff;border:0.5px solid #e0e0da;border-radius:12px;padding:1rem 1.25rem;position:relative;overflow:hidden}
.report-card::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;border-radius:12px 0 0 12px}
.report-card.verde::before{background:#0F6E56}
.report-card.amarelo::before{background:#C57A00}
.report-card.vermelho::before{background:#C81E1E}
.report-card.cinza::before{background:#9E9D97}
.rc-name{font-size:15px;font-weight:500;margin-bottom:4px}
.rc-client{font-size:11px;color:#888;margin-bottom:6px}
.rc-resp{font-size:11px;color:#aaa;margin-bottom:8px}
.rc-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:10px}
.rc-row{margin-bottom:7px}
.rc-label{font-size:11px;color:#888;margin-bottom:2px}
.rc-value{font-size:13px;color:#1a1a18;line-height:1.45}
.rc-urgency{background:#fffbf0;border:0.5px solid #f0a500;border-radius:6px;padding:6px 10px;margin-bottom:8px}
.rc-urgency .rc-label{color:#854F0B;font-weight:500}
.rc-log{background:#f8f5ff;border:0.5px solid #c0b0f0;border-radius:6px;padding:6px 10px;margin-bottom:8px}
.rc-log .rc-label{color:#5533aa;font-weight:500}
.rc-daily-week{background:#f0f4ff;border:0.5px solid #c0cef7;border-radius:6px;padding:6px 10px;margin-bottom:8px}
.rc-daily-week .rc-label{color:#3355cc;font-weight:500;margin-bottom:6px}
.rc-daily-day{margin-bottom:5px;font-size:12px;padding-bottom:4px;border-bottom:0.5px solid #e8eeff}
.rc-daily-day:last-child{border-bottom:none;margin-bottom:0}
.rc-daily-day strong{color:#3355cc;display:block;margin-bottom:2px}
.rc-checklist{margin-top:8px;border-top:0.5px solid #f0f0ec;padding-top:8px}
.rc-check-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:12px}
.rc-check-ok{color:#0F6E56}.rc-check-nok{color:#C81E1E}
.rc-empty{font-size:12px;color:#bbb;font-style:italic}
.urgency-panel{background:#fffbf0;border:1px solid #f0a500;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem}
.urgency-panel h3{font-size:14px;font-weight:500;color:#854F0B;margin-bottom:10px}
.urgency-item{display:flex;gap:10px;margin-bottom:8px;font-size:13px}
.urgency-item .proj-name{font-weight:500;min-width:120px;color:#854F0B}
.no-urgency{font-size:13px;color:#aaa;font-style:italic}
.exec-summary{background:#f0f4ff;border:0.5px solid #c0cef7;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem}
.exec-summary h3{font-size:14px;font-weight:500;color:#3355cc;margin-bottom:10px}
.exec-proj{margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid #dde6ff}
.exec-proj:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.exec-proj-name{font-size:13px;font-weight:500;margin-bottom:3px}
.exec-proj-text{font-size:13px;color:#444;line-height:1.5}

/* CONSOLIDADO */
.history-list-wrap{display:flex;flex-direction:column;gap:10px}
.history-item{background:#fff;border:0.5px solid #e0e0da;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.hist-date{font-size:14px;font-weight:500}
.hist-meta{font-size:12px;color:#888;margin-top:2px}
.hist-actions{display:flex;gap:6px}
.hist-btn{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:0.5px solid #e0e0da;background:transparent;font-family:inherit;color:#555}
.hist-btn.danger{color:#C81E1E;border-color:#C81E1E}
.empty-state{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px}
.alert-banner{background:#FAEEDA;border:0.5px solid #C57A00;border-radius:8px;padding:10px 14px;margin-bottom:1.5rem;font-size:13px;color:#854F0B;display:flex;align-items:center;gap:8px}

@media(prefers-color-scheme:dark){
  body{background:#1a1a18;color:#f0efe8}
  .project-card,.report-card,.btn-primary,.history-item{background:#232321;border-color:#333}
  .checklist{background:#2a2a28;border-color:#444}
  .check-item span{color:#f0efe8}.check-item.checked span{color:#666}
  .field textarea{background:#2c2c2a;border-color:#444;color:#f0efe8}
  .field textarea:focus{background:#333;border-color:#666}
  .urgency-field textarea{background:#2e2a1a;border-color:#c57a00}
  .log-field textarea{background:#1e1a2e;border-color:#7755cc}
  .daily-field textarea{background:#1a1e33;border-color:#3355cc}
  .retro-field textarea{background:#1a2e22;border-color:#0F6E56}
  .resp-row input{background:#2c2c2a;border-color:#444;color:#f0efe8}
  .sprint-dates{background:#1a1e33;border-color:#3355cc}
  .sprint-dates-inputs input,.sprint-dates-inputs select{background:#232840;border-color:#3355cc;color:#f0efe8}
  .nav-btn.active,.mode-btn.active{background:#f0efe8;color:#1a1a18;border-color:#f0efe8}
  .rc-value{color:#f0efe8}
  .btn-primary{color:#f0efe8}
  .btn-primary.success{background:#085041;color:#9FE1CB;border-color:#1D9E75}
  .btn-save{background:#f0efe8;color:#1a1a18}
  .rc-urgency{background:#2e2a1a;border-color:#c57a00}
  .rc-log{background:#1e1a2e;border-color:#7755cc}
  .rc-daily-week{background:#1a1e33;border-color:#3355cc}
  .urgency-panel{background:#2e2a1a;border-color:#c57a00}
  .exec-summary{background:#1a1e33;border-color:#3355cc}
  .exec-proj-text{color:#ccc}
  .hist-btn{color:#aaa;border-color:#444}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>🔒 Meu Controle de Projetos</h2>
    <p>Digite a senha para acessar</p>
    <input type="password" id="pwd-input" placeholder="Senha" onkeydown="if(event.key==='Enter')checkPwd()">
    <button onclick="checkPwd()">Entrar</button>
    <div class="login-error" id="pwd-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div id="app-content" style="display:none">
<h1>Meu Controle de Projetos</h1>
<p class="subtitle">Registre o dia a dia e gere o relatório de sexta automaticamente.</p>
<div id="alert-5du" style="display:none" class="alert-banner">⚠️ <span id="alert-5du-text"></span></div>

<div class="nav">
  <button class="nav-btn active" onclick="showPage('projetos')">📁 Projetos</button>
  <button class="nav-btn"        onclick="showPage('relatorio')">📋 Relatório</button>
  <button class="nav-btn"        onclick="showPage('consolidado')">🕓 Consolidado</button>
</div>

<div id="page-projetos">
  <div class="cat-tabs">
    <button class="cat-btn sprint active"  onclick="switchCat('sprint')">Sprint ativo</button>
    <button class="cat-btn sustentacao"    onclick="switchCat('sustentacao')">Sustentação</button>
    <button class="cat-btn inicial"        onclick="switchCat('inicial')">Inicial</button>
    <button class="cat-btn pausado"        onclick="switchCat('pausado')">Pausado</button>
  </div>
  <div id="cat-sprint"      class="cat-panel active"><div class="proj-tabs" id="proj-tabs-sprint"></div><div id="sprint-cards"></div></div>
  <div id="cat-sustentacao" class="cat-panel"><div class="proj-tabs" id="proj-tabs-sustentacao"></div><div id="sustentacao-cards"></div></div>
  <div id="cat-inicial"     class="cat-panel"><div class="proj-tabs" id="proj-tabs-inicial"></div><div id="inicial-cards"></div></div>
  <div id="cat-pausado"     class="cat-panel"><div class="proj-tabs" id="proj-tabs-pausado"></div><div id="pausado-cards"></div></div>
  <div class="actions">
    <button class="btn-primary btn-save" onclick="saveSnapshot()">💾 Salvar consolidado desta semana</button>
    <button class="btn-primary" id="btnCopy" onclick="copyMarkdown()">Copiar para Notion</button>
    <button class="btn-secondary" onclick="clearCat()">Limpar aba atual</button>
  </div>
</div>

<div id="page-relatorio" style="display:none">
  <div class="report-actions">
    <button class="mode-btn active" id="modeInterno" onclick="setMode('interno')">🔒 Interno</button>
    <button class="mode-btn"        id="modeCliente" onclick="setMode('cliente')">📤 Cliente</button>
    <button class="btn-primary" id="btnCopyReport" onclick="copyReport()" style="flex:1;min-width:160px">Copiar relatório</button>
  </div>
  <div id="report-content"></div>
</div>

<div id="page-consolidado" style="display:none">
  <p style="font-size:13px;color:#888;margin-bottom:1rem">Snapshots salvos semanalmente.</p>
  <div id="history-list-el"></div>
</div>
</div>

<script>
/* ── PROJETOS — FONTE DA VERDADE ── */
const SPRINT_PROJS = [
  {id:"sempre_nova", name:"Sempre Nova", client:"SEDU-ES"},
  {id:"sgter",       name:"SGTER",       client:""},
  {id:"sigest",      name:"SIGEST",      client:""},
];
const SUST_PROJS = [
  {id:"alimentacao", name:"Alimentação",                    client:""},
  {id:"egestao",     name:"E-Gestão",                       client:""},
  {id:"questoes",    name:"Questões",                       client:""},
  {id:"alim_af",     name:"Alimentação – Agric. Familiar",  client:""},
  {id:"sgf",         name:"SGF",                            client:""},
];
const INIC_PROJS = [
  {id:"sispc", name:"SISPC",    client:""},
  {id:"pgp",   name:"PGP/SIPD", client:""},
];
const PAUS_PROJS = [
  {id:"pes", name:"PES", client:""},
];

/* ── CONSTANTES ── */
const DAYS = [
  {key:"seg",label:"Segunda"},
  {key:"ter",label:"Terça"},
  {key:"qua",label:"Quarta"},
  {key:"qui",label:"Quinta"},
  {key:"sex",label:"Sexta"},
];
const CHECKLIST_ITEMS = [
  {k:"planej_enviado", l:"Planejamento de desenvolvimento enviado ao cliente após a planning"},
  {k:"planej_cp",      l:"Planejamento registrado no CP"},
  {k:"req_enviado",    l:"Planejamento de requisitos enviado pelo analista (até 5º dia útil)"},
  {k:"req_cp",         l:"Planejamento de requisitos inserido no CP"},
  {k:"daily_ok",       l:"Dailies acontecendo todos os dias"},
  {k:"email_review",   l:"E-mail de entrega enviado após a review"},
  {k:"retro_ok",       l:"Retro realizada após a review"},
  {k:"plano_testes",   l:"Plano de testes executado"},
];
const STATUS_OPTS   = [{key:"verde",label:"✅ No prazo"},{key:"amarelo",label:"⚠️ Atenção"},{key:"vermelho",label:"🔴 Em risco"},{key:"cinza",label:"⏸ Pausado"}];
const STATUS_LABELS = {verde:"No prazo",amarelo:"Atenção",vermelho:"Em risco",cinza:"Pausado","":"—"};
const TAB_LABELS    = {sprint:"Sprint ativo",sustentacao:"Sustentação",inicial:"Inicial",pausado:"Pausado"};
const PROJECTS_META = {
  sprint:      SPRINT_PROJS.map(p=>({...p, fi:[{k:"status",l:"Status"},{k:"proximos",l:"Próximos passos"},{k:"riscos",l:"Riscos"},{k:"bloqueios",l:"Bloqueios"},{k:"obs",l:"Obs."},{k:"retro_bem",l:"Retro: o que foi bem"},{k:"retro_melhora",l:"Retro: o que melhorar"},{k:"retro_acoes",l:"Retro: ações definidas"}], fc:[{k:"status",l:"Status"},{k:"proximos",l:"Próximos passos"}], hasChecklist:true})),

/* ── ALERTA 5DU ── */
function check5DU(){
  const today=new Date();
  let count=0, d=new Date(today.getFullYear(),today.getMonth(),1);
  while(d<=today){if(d.getDay()!==0&&d.getDay()!==6)count++;d.setDate(d.getDate()+1);}
  if(count<=5){
    document.getElementById("alert-5du").style.display="flex";
    document.getElementById("alert-5du-text").textContent=`Hoje é o ${count}º dia útil do mês. Verifique se o planejamento de requisitos foi enviado e inserido no CP.`;
  }
}

/* ── DATAS ── */
function calcDates(pid){
  const startEl=document.querySelector(`[data-sprint-start="${pid}"]`);
  const durEl=document.querySelector(`[data-sprint-dur="${pid}"]`);
  const reviewEl=document.querySelector(`[data-sprint-review="${pid}"]`);
  const retroEl=document.querySelector(`[data-sprint-retro="${pid}"]`);
  const resEl=document.getElementById("dates-"+pid);
  if(!startEl||!resEl||!startEl.value){if(resEl)resEl.innerHTML="";return;}
  const start=new Date(startEl.value+"T12:00:00");
  const dur=parseInt(durEl?durEl.value:"30");
  const end=dur===30?new Date(start.getFullYear(),start.getMonth()+1,0):(()=>{const e=new Date(start);e.setDate(start.getDate()+14);return e;})();
  const retro=new Date(end);retro.setDate(end.getDate()+1);
  if(reviewEl&&!reviewEl.dataset.manual)reviewEl.value=end.toISOString().split("T")[0];
  if(retroEl&&!retroEl.dataset.manual)retroEl.value=retro.toISOString().split("T")[0];
  const today=new Date();today.setHours(0,0,0,0);
  const rv=reviewEl&&reviewEl.value?new Date(reviewEl.value+"T12:00:00"):end;
  const diff=Math.ceil((rv-today)/86400000);
  resEl.innerHTML=diff>0?`<span class="days-counter ${diff<=3?"days-warn":"days-ok"}">${diff}d para review</span>`:diff===0?`<span class="days-counter days-warn">Review hoje!</span>`:`<span class="days-counter days-late">Review passou há ${Math.abs(diff)}d</span>`;
  const dd=load();
  dd[`sprint_start_${pid}`]=startEl.value;
  dd[`sprint_dur_${pid}`]=durEl?durEl.value:"30";
  if(reviewEl)dd[`sprint_review_${pid}`]=reviewEl.value;
  if(retroEl)dd[`sprint_retro_${pid}`]=retroEl.value;
  save(dd);
}

/* ── RENDER ── */
function buildProjTabs(catKey,projs){
  const tabsEl=document.getElementById(`proj-tabs-${catKey}`);
  if(!tabsEl)return;
  tabsEl.innerHTML=projs.map((p,i)=>`<button class="proj-btn${i===0?" active":""}" onclick="switchProjPanel('${catKey}','${p.id}',this)">${p.name}</button>`).join("");
  projs.forEach((p,i)=>{
    const panel=document.getElementById(`projpanel-${catKey}-${p.id}`);
    if(panel)panel.className=`proj-panel${i===0?" active":""}`;
  });
}

function switchProjPanel(catKey,pid,btn){
  document.getElementById(`proj-tabs-${catKey}`).querySelectorAll(".proj-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(`#${catKey}-cards .proj-panel`).forEach(p=>p.classList.remove("active"));
  document.getElementById(`projpanel-${catKey}-${pid}`).classList.add("active");
}

function switchDayTab(pid,day,btn){
  const card=btn.closest(".project-card");
  card.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  card.querySelectorAll(".day-panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(`daypanel-${pid}-${day}`).classList.add("active");
}

  buildProjTabs("sprint",      SPRINT_PROJS);

  let html=`<p style="font-size:13px;color:#888;margin-bottom:1.5rem">${reportMode==="interno"?"Visão interna":"Visão cliente"} · ${today}</p>`;
  if(reportMode==="interno"){
    const allU=[];
    Object.values(PROJECTS_META).forEach(projs=>projs.forEach(proj=>{
      const u=(d[proj.id+"_urgencia"]||"").trim();if(u)allU.push({name:proj.name,text:u});
      DAYS.forEach(day=>{const du=(d[day.key+"_"+proj.id+"_urgencia"]||"").trim();if(du)allU.push({name:`${proj.name} (${day.label})`,text:du});});
    }));
    html+=`<div class="urgency-panel"><h3>⚠️ Urgências do portfólio</h3>`;
    if(allU.length)allU.forEach(u=>{html+=`<div class="urgency-item"><span class="proj-name">${u.name}</span><span>${u.text}</span></div>`;});
    else html+=`<div class="no-urgency">Nenhuma urgência registrada esta semana.</div>`;
    html+=`</div>`;
    html+=`<div class="exec-summary"><h3>📄 Resumo executivo</h3>`;
    Object.values(PROJECTS_META).forEach(projs=>projs.forEach(proj=>{
      const st=STATUS_LABELS[d["status_"+proj.id]||""]||"—";
      const prox=(d[proj.id+"_proximos"]||d[proj.id+"_etapa"]||d[proj.id+"_andamento"]||"").trim();
      const riscos=(d[proj.id+"_riscos"]||"").trim();
      let s=`Status: ${st}.`;if(prox)s+=` ${prox}.`;if(riscos)s+=` Riscos: ${riscos}.`;
      html+=`<div class="exec-proj"><div class="exec-proj-name">${proj.name}${proj.client?` (${proj.client})`:""}</div><div class="exec-proj-text">${s}</div></div>`;
    }));
    html+=`</div>`;
  }
  for(const[tabKey,projs]of Object.entries(PROJECTS_META)){
    html+=`<div class="report-section"><h2>${TAB_LABELS[tabKey]}</h2><div class="report-grid">`;
    projs.forEach(proj=>{
      const st=d["status_"+proj.id]||"";
      const fields=reportMode==="interno"?proj.fi:proj.fc;
      const urgencia=(d[proj.id+"_urgencia"]||"").trim();
      const logDecisoes=(d[proj.id+"_log"]||"").trim();
      const resps=[d[proj.id+"_resp_dev"]&&`Dev: ${d[proj.id+"_resp_dev"]}`,d[proj.id+"_resp_arq"]&&`Arq: ${d[proj.id+"_resp_arq"]}`,d[proj.id+"_resp_analista"]&&`Analista: ${d[proj.id+"_resp_analista"]}`].filter(Boolean).join(" · ");
      html+=`<div class="report-card ${st||"cinza"}"><div class="rc-name">${proj.name}</div>${proj.client?`<div class="rc-client">${proj.client}</div>`:""}${resps&&reportMode==="interno"?`<div class="rc-resp">${resps}</div>`:""}<span class="rc-badge badge-${st||"cinza"}">${STATUS_LABELS[st]||"—"}</span>`;
      if(urgencia&&reportMode==="interno")html+=`<div class="rc-urgency"><div class="rc-label">⚠️ Urgências</div><div class="rc-value">${urgencia.replace(/\n/g,"<br>")}</div></div>`;
      if(logDecisoes&&reportMode==="interno")html+=`<div class="rc-log"><div class="rc-label">📝 Decisões</div><div class="rc-value">${logDecisoes.replace(/\n/g,"<br>")}</div></div>`;
      if(reportMode==="interno"&&proj.hasChecklist){
        const rows=DAYS.map(day=>{
          const daily=(d[day.key+"_"+proj.id+"_daily"]||"").trim();
          const urg=(d[day.key+"_"+proj.id+"_urgencia"]||"").trim();
          const log=(d[day.key+"_"+proj.id+"_log"]||"").trim();
          if(!daily&&!urg&&!log)return"";
          let txt=`<div class="rc-daily-day"><strong>${day.label}</strong>`;
          if(daily)txt+=`<span>${daily}</span>`;if(urg)txt+=`<span>⚠️ ${urg}</span>`;if(log)txt+=`<span>📝 ${log}</span>`;
          return txt+`</div>`;
        }).filter(Boolean).join("");
        if(rows)html+=`<div class="rc-daily-week"><div class="rc-label">📋 Dailies da semana</div>${rows}</div>`;
      }
      let hasContent=false;
      fields.forEach(f=>{const val=(d[proj.id+"_"+f.k]||"").trim();if(val){hasContent=true;html+=`<div class="rc-row"><div class="rc-label">${f.l}</div><div class="rc-value">${val.replace(/\n/g,"<br>")}</div></div>`;}});
      if(proj.hasChecklist&&reportMode==="interno"){
        const done=CHECKLIST_ITEMS.filter(i=>d[`chk_${proj.id}_${i.k}`]===true).length;
        html+=`<div class="rc-checklist"><div class="rc-label">Controle de fluxo — ${done}/${CHECKLIST_ITEMS.length}</div>`;
        CHECKLIST_ITEMS.forEach(item=>{const ok=d[`chk_${proj.id}_${item.k}`]===true;html+=`<div class="rc-check-row ${ok?"rc-check-ok":"rc-check-nok"}">${ok?"✅":"❌"} ${item.l}</div>`;});
        html+=`</div>`;hasContent=true;
      }
      if(!hasContent)html+=`<div class="rc-empty">Nenhuma informação preenchida</div>`;
      html+=`</div>`;
    });
    html+=`</div></div>`;
  }
  document.getElementById("report-content").innerHTML=html;
}

/* ── CONSOLIDADO ── */
function saveSnapshot(){
  const h=loadHist();
  const today=new Date();
  const label=today.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
  const existing=h.findIndex(x=>x.label===label);
  const snap={label,ts:today.toISOString(),data:load()};
  if(existing>=0){if(!confirm(`Já existe um consolidado de ${label}. Substituir?`))return;h[existing]=snap;}
  else h.unshift(snap);
  saveHist(h);alert(`Consolidado de ${label} salvo!`);
}

function renderHistory(){
  const h=loadHist();
  const el=document.getElementById("history-list-el");
  if(!h.length){el.innerHTML=`<div class="empty-state">Nenhum consolidado salvo ainda.</div>`;return;}
  el.innerHTML=`<div class="history-list-wrap">`+h.map((snap,i)=>`
    <div class="history-item">
      <div><div class="hist-date">📅 ${snap.label}</div><div class="hist-meta">Salvo em ${new Date(snap.ts).toLocaleString("pt-BR")}</div></div>
      <div class="hist-actions"><button class="hist-btn" onclick="viewSnapshot(${i})">Visualizar</button><button class="hist-btn danger" onclick="deleteSnapshot(${i})">Excluir</button></div>
    </div>`).join("")+`</div>`;
}

function viewSnapshot(i){
  const snap=loadHist()[i];if(!snap)return;
  const win=window.open("","_blank");
  const d=snap.data;
  let html=`<html><head><meta charset="UTF-8"><title>Portfólio ${snap.label}</title><style>body{font-family:sans-serif;padding:2rem;max-width:860px;margin:0 auto}h1{margin-bottom:1rem}h2{color:#888;font-size:13px;text-transform:uppercase;margin:1.5rem 0 .5rem}h3{font-size:15px;margin:.75rem 0 .25rem}p{font-size:13px;margin:.2rem 0;color:#444}.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:6px}.verde{background:#E1F5EE;color:#0F6E56}.amarelo{background:#FAEEDA;color:#854F0B}.vermelho{background:#FDE8E8;color:#9B1C1C}.cinza{background:#F1EFE8;color:#5F5E5A}</style></head><body><h1>Portfólio — ${snap.label}</h1>`;
  for(const[tabKey,projs]of Object.entries(PROJECTS_META)){
    html+=`<h2>${TAB_LABELS[tabKey]}</h2>`;
    projs.forEach(proj=>{
      const st=d["status_"+proj.id]||"cinza";
      html+=`<h3>${proj.name}${proj.client?` (${proj.client})`:""}</h3><span class="badge ${st}">${STATUS_LABELS[st]||"—"}</span>`;
      proj.fi.forEach(f=>{const val=(d[proj.id+"_"+f.k]||"").trim();if(val)html+=`<p><strong>${f.l}:</strong> ${val}</p>`;});
    });
  }
  html+=`</body></html>`;
  win.document.write(html);win.document.close();
}

function deleteSnapshot(i){
  if(!confirm("Excluir este consolidado?"))return;
  const h=loadHist();h.splice(i,1);saveHist(h);renderHistory();
}

/* ── COPY ── */
function copyMarkdown(){
  const d=load(),today=new Date().toLocaleDateString("pt-BR");
  let md=`# Meu Controle de Projetos — ${today}\n\n`;
  for(const[tabKey,projs]of Object.entries(PROJECTS_META)){
    md+=`## ${TAB_LABELS[tabKey]}\n\n`;
    projs.forEach(proj=>{
      md+=`### ${proj.name}${proj.client?` (${proj.client})`:""}\n`;
      proj.fi.forEach(f=>{const v=(d[proj.id+"_"+f.k]||"").trim();if(v)md+=`**${f.l}:** ${v}\n`;});
      md+="\n";
    });
  }
  navigator.clipboard.writeText(md).then(()=>{
    const btn=document.getElementById("btnCopy");
    btn.textContent="Copiado!";btn.classList.add("success");
    setTimeout(()=>{btn.textContent="Copiar para Notion";btn.classList.remove("success");},2500);
  });
}

function copyReport(){
  const d=load(),today=new Date().toLocaleDateString("pt-BR");
  let md=`# Relatório de Portfólio — ${today} (${reportMode==="interno"?"Interno":"Cliente"})\n\n`;
  if(reportMode==="interno"){
    md+=`## ⚠️ Urgências\n`;
    let anyU=false;
    Object.values(PROJECTS_META).forEach(projs=>projs.forEach(proj=>{const u=(d[proj.id+"_urgencia"]||"").trim();if(u){md+=`**${proj.name}:** ${u}\n`;anyU=true;}}));
    if(!anyU)md+=`Nenhuma urgência registrada.\n`;
    md+="\n";
  }
  for(const[tabKey,projs]of Object.entries(PROJECTS_META)){
    md+=`## ${TAB_LABELS[tabKey]}\n\n`;
    projs.forEach(proj=>{
      const st=d["status_"+proj.id]||"";
      const fields=reportMode==="interno"?proj.fi:proj.fc;
      md+=`### ${proj.name}${proj.client?` (${proj.client})`:""}\n**Status:** ${STATUS_LABELS[st]||"—"}\n`;
      const urg=(d[proj.id+"_urgencia"]||"").trim();if(urg&&reportMode==="interno")md+=`**⚠️ Urgências:** ${urg}\n`;
      const log=(d[proj.id+"_log"]||"").trim();if(log&&reportMode==="interno")md+=`**📝 Decisões:** ${log}\n`;
      if(reportMode==="interno"&&proj.hasChecklist)DAYS.forEach(day=>{const daily=(d[day.key+"_"+proj.id+"_daily"]||"").trim();if(daily)md+=`**Daily ${day.label}:** ${daily}\n`;});
      fields.forEach(f=>{const v=(d[proj.id+"_"+f.k]||"").trim();if(v)md+=`**${f.l}:** ${v}\n`;});
      if(proj.hasChecklist&&reportMode==="interno"){md+=`\n**Controle de fluxo:**\n`;CHECKLIST_ITEMS.forEach(item=>{const ok=d[`chk_${proj.id}_${item.k}`]===true;md+=`- [${ok?"x":" "}] ${item.l}\n`;});}
      md+="\n";
    });
  }
  navigator.clipboard.writeText(md).then(()=>{
    const btn=document.getElementById("btnCopyReport");
    btn.textContent="Copiado!";btn.classList.add("success");
    setTimeout(()=>{btn.textContent="Copiar relatório";btn.classList.remove("success");},2500);
  });
}
